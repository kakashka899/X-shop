<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>X shop</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;overflow:auto;transition:.3s} .stars{position:fixed;width:100%;height:100%;z-index:0}.star{position:absolute;border-radius:50%;animation:blink infinite ease-in-out}@keyframes blink{0%{opacity:.2}50%{opacity:1;transform:scale(1.5)}100%{opacity:.2}}
.logo{position:absolute;top:25px;left:35px;font-size:58px;font-weight:bold;color:#b266ff;text-shadow:0 0 4px #a855ff;z-index:2}.top-bar{position:absolute;top:25px;right:30px;z-index:5}
#searchInput,input,select{padding:14px;border:none;border-radius:16px;background:rgba(40,20,60,.95);color:#fff;outline:none;font-size:15px;border:1px solid rgba(180,120,255,.3);box-sizing:border-box}
#searchInput{width:250px;border-radius:18px}
.menu{position:absolute;top:115px;left:40px;display:flex;flex-direction:column;gap:18px;z-index:2}
.menu button{background:none;border:none;color:#d6b3ff;font-size:22px;cursor:pointer;text-align:left;transition:.2s}
.menu button:hover{transform:translateX(5px);color:#fff}

.panel{position:absolute;left:220px;width:320px;padding:20px;border-radius:22px;background:rgba(20,20,20,.96);border:1px solid rgba(180,120,255,.35);display:none;z-index:20;backdrop-filter:blur(10px)}
.panel h2{margin-top:0;color:#d8b4fe}#settingsPanel{top:100px}#loginPanel{top:360px}

.cards{position:absolute;top:120px;right:30px;width:72%;display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding-bottom:80px;z-index:2}
.card{background:rgba(140,0,255,.15);border:1px solid rgba(180,120,255,.35);border-radius:24px;padding:18px;display:flex;flex-direction:column;min-height:420px;backdrop-filter:blur(5px);box-shadow:0 0 15px rgba(168,85,247,.2);transition:.2s;opacity:0;transform:translateY(50px);animation:cardShow .8s forwards}
.card:hover{transform:translateY(-5px);box-shadow:0 0 25px rgba(200,120,255,.5),0 0 40px rgba(120,0,255,.25)}

.product-image{height:170px;border-radius:18px;background:linear-gradient(135deg,rgba(180,120,255,.5),rgba(80,0,150,.7));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;margin-bottom:18px}
.product-title{font-size:30px;font-weight:bold;margin-bottom:15px;color:#d9b3ff}.product-price{font-size:22px;line-height:1.5;color:#c084fc;margin-bottom:18px}

.info-box{background:rgba(255,255,255,.05);border-radius:14px;padding:12px;margin-top:auto;border:1px solid rgba(255,255,255,.08)}

.white-theme{background:#fff;color:#000}.white-theme .card{background:#f1f1f1;border:1px solid #ccc}.white-theme .panel{background:#fff;color:#000;border:1px solid #ccc}.white-theme input,.white-theme select{background:#fff;color:#000}.white-theme .menu button{color:#6d28d9}
</style>
</head>

<body>
<div class="stars" id="stars"></div>
<div class="logo">X shop</div>

<div class="top-bar">
<input type="text" id="searchInput" placeholder="Поиск товара..." onkeyup="searchProducts()">
</div>

<div class="menu">

<button onclick="togglePanel('settingsPanel');playClick()">Настройки</button>
<button onclick="togglePanel('loginPanel');playClick()">Логин</button>

<button onclick="window.open('https://discord.gg/YWHvP37FpZ','_blank');playClick()">
Discord
</button>

</div>

<div class="panel" id="settingsPanel">
<h2>Настройки</h2>
<select><option>Подсказки</option></select>
</div>

<div class="panel" id="loginPanel">
<h2>Вход</h2>
<input type="text" id="nickname" placeholder="Ник">
<input type="password" id="password" placeholder="Пароль">
<button onclick="saveAccount();playClick()">Войти</button>
</div>

<script>
function togglePanel(id){
let p=document.getElementById(id);
p.style.display=p.style.display==='block'?'none':'block';
}
function playClick(){console.log("click")}
</script>

</body>
</html>
