<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X shop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

/* ---------- ЗВЕЗДЫ ---------- */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:blink infinite ease-in-out;
}

@keyframes blink{
    0%{
        opacity:0.2;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.5);
    }
    100%{
        opacity:0.2;
        transform:scale(1);
    }
}

/* ---------- ЛОГО ---------- */

.logo{
    position:absolute;
    top:25px;
    left:35px;

    color:#b266ff;
    font-size:58px;
    font-weight:bold;
    letter-spacing:3px;

    /* уменьшенное свечение */
    text-shadow:
        0 0 4px #a855ff,
        0 0 8px #9333ea;

    z-index:2;
}

/* ---------- КАРТОЧКИ ---------- */

.cards{
    position:absolute;
    top:130px;
    left:20px;

    width:calc(100% - 40px);

    display:grid;

    /* 3 карточки в ряд */
    grid-template-columns:repeat(3, 1fr);

    gap:20px;

    z-index:2;
}

.card{
    height:220px;

    background:rgba(140, 0, 255, 0.15);

    border:1px solid rgba(180, 120, 255, 0.4);

    border-radius:22px;

    backdrop-filter:blur(5px);

    box-shadow:
        0 0 15px rgba(168, 85, 247, 0.25);

    transition:0.3s;
}

/* эффект при наведении */
.card:hover{
    transform:translateY(-5px);

    box-shadow:
        0 0 25px rgba(168, 85, 247, 0.45);
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="logo">X shop</div>

<div class="cards">

    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>

    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>

</div>

<script>

const starsContainer = document.getElementById("stars");

/* создание звезд */

for(let i = 0; i < 300; i++){

    let star = document.createElement("div");

    star.className = "star";

    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";

    let size = Math.random() * 3 + 1 + "px";

    star.style.width = size;
    star.style.height = size;

    star.style.animationDuration =
        (Math.random() * 4 + 2) + "s";

    starsContainer.appendChild(star);
}

</script>

</body>
</html>
