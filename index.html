<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>X shop</title>

<style>
/* Фон */
body {
    margin: 0;
    overflow: hidden;
    background: black;
    height: 100vh;
    font-family: Arial, sans-serif;
}

/* Звезды */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: blink 3s infinite ease-in-out;
}

/* Мигание */
@keyframes blink {
    0% {
        opacity: 0.2;
        transform: scale(1);
    }
    50% {
        opacity: 1;
        transform: scale(1.8);
    }
    100% {
        opacity: 0.2;
        transform: scale(1);
    }
}

/* Надпись */
.logo {
    position: absolute;
    top: 30px;
    left: 40px;
    color: #a855ff;
    font-size: 60px;
    font-weight: bold;
    letter-spacing: 3px;

    text-shadow:
        0 0 5px #a855ff,
        0 0 10px #a855ff,
        0 0 20px #9333ea,
        0 0 40px #7e22ce;

    animation: glow 2s infinite alternate;
}

/* Свечение текста */
@keyframes glow {
    from {
        text-shadow:
            0 0 5px #a855ff,
            0 0 10px #a855ff,
            0 0 20px #9333ea;
    }

    to {
        text-shadow:
            0 0 10px #c084fc,
            0 0 20px #c084fc,
            0 0 40px #9333ea,
            0 0 60px #7e22ce;
    }
}
</style>
</head>

<body>

<div class="logo">X shop</div>

<div class="stars" id="stars"></div>

<script>
const starsContainer = document.getElementById("stars");

/* Создание звезд */
for (let i = 0; i < 250; i++) {
    let star = document.createElement("div");
    star.className = "star";

    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";

    let size = Math.random() * 3 + "px";
    star.style.width = size;
    star.style.height = size;

    star.style.animationDuration =
        (Math.random() * 3 + 2) + "s";

    starsContainer.appendChild(star);
}
</script>

</body>
  </html>
