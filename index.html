<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X shop</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
    color:white;
}

/* ---------- ЗВЕЗДЫ ---------- */

.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:blink infinite ease-in-out;
}

@keyframes blink{
    0%{
        opacity:0.2;
        transform:scale(1);
    }
    50%{
        opacity:1;
        transform:scale(1.5);
    }
    100%{
        opacity:0.2;
        transform:scale(1);
    }
}

/* ---------- ЛОГО ---------- */

.logo{
    position:absolute;
    top:25px;
    left:35px;

    color:#b266ff;
    font-size:58px;
    font-weight:bold;
    letter-spacing:3px;

    text-shadow:
        0 0 4px #a855ff,
        0 0 8px #9333ea;

    z-index:2;
}

/* ---------- МЕНЮ ---------- */

.menu{
    position:absolute;
    top:115px;
    left:40px;

    display:flex;
    flex-direction:column;
    gap:18px;

    z-index:2;
}

.menu a{
    color:#d6b3ff;
    text-decoration:none;
    font-size:22px;

    transition:0.2s;
}

.menu a:hover{
    color:white;
    transform:translateX(6px);
}

/* ---------- КАРТОЧКИ ---------- */

.cards{
    position:absolute;
    top:60px;
    right:30px;

    width:72%;

    display:grid;
    grid-template-columns:repeat(3, 1fr);

    gap:22px;

    z-index:2;
}

.card{
    height:420px;

    background:rgba(140, 0, 255, 0.15);

    border:1px solid rgba(180, 120, 255, 0.4);

    border-radius:24px;

    backdrop-filter:blur(5px);

    box-shadow:
        0 0 15px rgba(168, 85, 247, 0.25);

    transition:0.2s;

    padding:18px;

    box-sizing:border-box;
}

/* ---------- АНИМАЦИЯ ---------- */

.card:hover{
    animation:float 0.9s infinite ease-in-out;

    box-shadow:
        0 0 25px rgba(168, 85, 247, 0.45);
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ---------- ТОВАР ---------- */

.product-image{
    width:100%;
    height:170px;

    border-radius:18px;

    background:linear-gradient(
        135deg,
        rgba(180,120,255,0.5),
        rgba(80,0,150,0.7)
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:28px;
    font-weight:bold;

    margin-bottom:18px;
}

.product-title{
    font-size:30px;
    font-weight:bold;

    margin-bottom:16px;

    color:#d9b3ff;
}

.product-price{
    color:#c084fc;

    font-size:22px;

    line-height:1.5;

    margin-bottom:18px;
}

/* ---------- ОПИСАНИЕ ---------- */

.info-box{
    background:rgba(255,255,255,0.05);

    border-radius:14px;

    padding:12px;

    border:1px solid rgba(255,255,255,0.08);
}

.info-box summary{
    cursor:pointer;

    font-size:18px;

    color:#e0c3ff;

    margin-bottom:10px;
}

.info-box p{
    color:#d4d4d4;

    line-height:1.5;

    font-size:16px;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="logo">X shop</div>

<!-- МЕНЮ -->

<div class="menu">
    <a href="#">Главная</a>
    <a href="#">Товары</a>
    <a href="#">Контакты</a>
    <a href="#">Отзывы</a>
</div>

<!-- КАРТОЧКИ -->

<div class="cards">

    <!-- 1 КАРТОЧКА -->

    <div class="card">

        <div class="product-image">
            ENERGY
        </div>

        <div class="product-title">
            Енерго масло
        </div>

        <div class="product-price">
            1 шт — 5 монет
            <br>
            или
            <br>
            1 пластина орбистали
        </div>

        <!-- ОТКРЫВАЮЩЕЕСЯ ОПИСАНИЕ -->

        <details class="info-box">

            <summary>
                Что такое енерго масло ▼
            </summary>

            <p>
                Енерго масло ето страная жидкость
                которая при ее выпивании
                в первый раз может дать вам способность,
                или ее можно использовать
                в крафтах сюжетных предметов.
            </p>

        </details>

    </div>

</div>

<script>

const starsContainer = document.getElementById("stars");

/* создание звезд */

for(let i = 0; i < 300; i++){

    let star = document.createElement("div");

    star.className = "star";

    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";

    let size = Math.random() * 3 + 1 + "px";

    star.style.width = size;
    star.style.height = size;

    star.style.animationDuration =
        (Math.random() * 4 + 2) + "s";

    starsContainer.appendChild(star);
}

</script>

</body>
    </html>
